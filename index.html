<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setlist Live</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- PANTALLA 1: LISTA DE CANCIONES -->
    <div id="screen-list" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>Setlist</h1>
            <button id="btn-add-song" class="btn-action">➕ Agregar</button>
        </div>
        <p style="color: #888; margin-bottom: 15px; font-size: 0.9rem;">💡 Mantené presionado y arrastrá para reordenar los temas.</p>
        <ul id="setlist-container"></ul>
        <!-- NUEVA SECCIÓN: SINCRONIZACIÓN -->
        <div style="margin-top: auto; padding-top: 30px; border-top: 1px solid #333; display: flex; gap: 10px;">
            <button id="btn-export" class="btn-action" style="background-color: #455a64; flex: 1; font-size: 0.9rem;">📤 Exportar Setlist</button>
            <label class="btn-action" style="background-color: #37474f; flex: 1; font-size: 0.9rem; text-align: center; cursor: pointer;">
                📥 Importar Setlist
                <input type="file" id="input-import" accept=".txt" style="display: none;">
            </label>
        </div>
    </div>

    <!-- PANTALLA 2: VISTA EN VIVO (LETRA) -->
    <div id="screen-lyrics" class="screen hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <button id="btn-back" class="btn-action">⬅ Volver</button>
            <button id="btn-edit-song" class="btn-action" style="background-color: #0288d1;">✏️ Editar</button>
        </div>
        <h2 id="song-title">Título</h2>
        
        <div id="controls">
            <button id="btn-play-scroll">▶ Iniciar Scroll</button>
            <button id="btn-reset-scroll">🔄 Reiniciar</button>
        </div>

        <!-- Alerta flotante de pausa instrumental -->
        <div id="pause-indicator" class="hidden">🎸 PAUSA INSTRUMENTAL: <span id="pause-countdown">0</span>s</div>

        <div id="lyrics-container">
            <div id="lyrics-content">
                <!-- Aquí se inyectará la letra procesada en líneas -->
            </div>
        </div>
    </div>

    <!-- PANTALLA 3: FORMULARIO (AGREGAR / EDITAR) -->
    <div id="screen-form" class="screen hidden">
        <h2 id="form-title" style="margin-bottom: 20px; color: #ffb300;">Agregar Canción</h2>
        <form id="song-form">
            <input type="hidden" id="form-id">
            
            <div class="form-group">
                <label>Título de la canción:</label>
                <input type="text" id="form-titulo" required placeholder="Ej: Peor para el Sol">
            </div>

            <div class="form-group">
                <label>Duración estimada (en segundos):</label>
                <input type="number" id="form-duracion" required placeholder="Ej: 240">
            </div>

            <div class="form-group">
                <label>Letra (Soporta pausas automáticas ej: [pause=15]):</label>
                <textarea id="form-letra" required rows="12" placeholder="Pegá la letra acá...&#10;Podés poner marcas como [pause=10] en un renglón vacío para congelar el scroll 10 segundos en los solos de guitarra."></textarea>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn-action" style="background-color: #2e7d32; flex: 1;">💾 Guardar</button>
                <button type="button" id="btn-cancel-form" class="btn-action" style="background-color: #c62828;">❌ Cancelar</button>
            </div>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
